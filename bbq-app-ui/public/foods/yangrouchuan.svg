<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff5e6"/><stop offset="100%" stop-color="#ffe0b2"/></linearGradient>
    <linearGradient id="meat" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4451a"/><stop offset="50%" stop-color="#c13a12"/><stop offset="100%" stop-color="#a33010"/></linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- stick -->
  <line x1="30" y1="160" x2="170" y2="40" stroke="#c8a06a" stroke-width="4" stroke-linecap="round"/>
  <!-- meat chunks -->
  <ellipse cx="60" cy="130" rx="22" ry="16" fill="url(#meat)" transform="rotate(-25 60 130)"/>
  <ellipse cx="90" cy="105" rx="22" ry="16" fill="url(#meat)" transform="rotate(-25 90 105)"/>
  <ellipse cx="120" cy="78" rx="22" ry="16" fill="url(#meat)" transform="rotate(-25 120 78)"/>
  <ellipse cx="148" cy="53" rx="18" ry="13" fill="url(#meat)" transform="rotate(-25 148 53)"/>
  <!-- grill marks -->
  <line x1="50" y1="126" x2="70" y2="134" stroke="#8b2500" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="101" x2="100" y2="109" stroke="#8b2500" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="74" x2="130" y2="82" stroke="#8b2500" stroke-width="1.5" opacity="0.5"/>
  <!-- spice dots -->
  <circle cx="65" cy="124" r="2" fill="#ff6b35" opacity="0.7"/>
  <circle cx="95" cy="99" r="2" fill="#ff6b35" opacity="0.7"/>
  <circle cx="125" cy="72" r="2" fill="#ff6b35" opacity="0.7"/>
  <circle cx="58" cy="132" r="1.5" fill="#2d8a4e" opacity="0.6"/>
  <circle cx="88" cy="107" r="1.5" fill="#2d8a4e" opacity="0.6"/>
  <!-- steam -->
  <path d="M75 90 Q78 80 75 70" stroke="#ccc" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M105 65 Q108 55 105 45" stroke="#ccc" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>